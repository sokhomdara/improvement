name: Keep Bot Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot every 5 minutes
        run: |
          curl -s https://improvement-5zlq.onrender.com > /dev/null
          curl -s https://improvement-5zlq.onrender.com > /dev/null
          curl -s https://improvement-5zlq.onrender.com > /dev/null
          echo "Triple pinged at $(date)"
