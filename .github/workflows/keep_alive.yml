name: Keep GPPC Bot Alive 24/7

on:
  schedule:
    # Run every 20 minutes, 24 hours a day, 7 days a week
    - cron: '*/20 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot to keep it awake
        run: |
          echo "Pinging GPPC QAQC Bot..."
          curl -s https://improvement-5zlq.onrender.com || true
          echo "Ping done at $(date)"

      - name: Trigger Render redeploy if needed
        run: |
          echo "Triggering Render redeploy..."
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{}' || true
          echo "Redeploy triggered at $(date)"

