name: Keep Bot Alive 24/7

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot every 10 minutes
        run: |
          curl -s https://improvement-5zlq.onrender.com > /dev/null
          echo "Bot pinged at $(date)"
